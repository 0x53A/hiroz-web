services:
  zenoh-router:
    image: eclipse/zenoh:1.9.0
    command: ["--no-multicast-scouting", "--listen", "tcp/0.0.0.0:7447", "--listen", "ws/0.0.0.0:7448"]
    restart: unless-stopped
    ports:
      - "7447:7447"
      - "7448:7448"
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 2s
      timeout: 5s
      retries: 3

  ros2:
    build:
      context: .
      dockerfile: Dockerfile.ros2
    # rmw_zenoh sessions don't recover from a router restart; restart the
    # nodes too if the router comes back
    restart: unless-stopped
    depends_on:
      zenoh-router:
        condition: service_healthy
    environment:
      - RMW_IMPLEMENTATION=rmw_zenoh_cpp
      - ZENOH_SESSION_CONFIG_URI=/config/zenoh_session.json5
