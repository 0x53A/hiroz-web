[workspace]

[package]
name = "hiroz-wasm-demo"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
hiroz = { path = "../../ros-z-wasm/crates/hiroz", default-features = false, features = [
  "lyrical",
  "rmw-zenoh",
] }
hiroz-cdr = { path = "../../ros-z-wasm/crates/hiroz-cdr" }
# String message types generated from the vendored message definitions
# (type names + RIHS01 hashes computed by hiroz-codegen at build time)
hiroz-msgs = { path = "../../ros-z-wasm/crates/hiroz-msgs", default-features = false, features = [
  "example_interfaces",
  "std_msgs",
] }
hiroz-protocol = { path = "../../ros-z-wasm/crates/hiroz-protocol", default-features = false, features = [
  "std",
  "rmw-zenoh",
] }

zenoh = { path = "../../zenoh-wasm/zenoh", default-features = false, features = [
  "transport_ws",
  "unstable",
] }
# wasm-threads turns on the SharedArrayBuffer threadpool (LocalExecutor workers)
zenoh-runtime = { path = "../../zenoh-wasm/commons/zenoh-runtime", features = [
  "wasm-threads",
] }

flume = "0.11"
serde = { version = "1", features = ["derive"] }
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
web-sys = { version = "0.3", features = [
  "console",
  "Document",
  "Element",
  "HtmlElement",
  "Window",
] }
tracing = "0.1"
tracing-wasm = "0.2"

[patch.crates-io]
zenoh = { path = "../../zenoh-wasm/zenoh" }
zenoh-ext = { path = "../../zenoh-wasm/zenoh-ext" }
zenoh-buffers = { path = "../../zenoh-wasm/commons/zenoh-buffers" }
zenoh-codec = { path = "../../zenoh-wasm/commons/zenoh-codec" }
zenoh-collections = { path = "../../zenoh-wasm/commons/zenoh-collections" }
zenoh-config = { path = "../../zenoh-wasm/commons/zenoh-config" }
zenoh-core = { path = "../../zenoh-wasm/commons/zenoh-core" }
zenoh-crypto = { path = "../../zenoh-wasm/commons/zenoh-crypto" }
zenoh-keyexpr = { path = "../../zenoh-wasm/commons/zenoh-keyexpr" }
zenoh-macros = { path = "../../zenoh-wasm/commons/zenoh-macros" }
zenoh-protocol = { path = "../../zenoh-wasm/commons/zenoh-protocol" }
zenoh-result = { path = "../../zenoh-wasm/commons/zenoh-result" }
zenoh-runtime = { path = "../../zenoh-wasm/commons/zenoh-runtime" }
zenoh-shm = { path = "../../zenoh-wasm/commons/zenoh-shm" }
zenoh-sync = { path = "../../zenoh-wasm/commons/zenoh-sync" }
zenoh-task = { path = "../../zenoh-wasm/commons/zenoh-task" }
zenoh-util = { path = "../../zenoh-wasm/commons/zenoh-util" }
zenoh-link = { path = "../../zenoh-wasm/io/zenoh-link" }
zenoh-link-commons = { path = "../../zenoh-wasm/io/zenoh-link-commons" }
zenoh-transport = { path = "../../zenoh-wasm/io/zenoh-transport" }
zenoh-plugin-trait = { path = "../../zenoh-wasm/plugins/zenoh-plugin-trait" }
